# Local development stack: PostgreSQL + the API.
# Usage:  docker compose up --build
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insurance_claims
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Wait until Postgres is genuinely ready before starting the app.
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurance_claims"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/insurance_claims
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    # Apply database migrations BEFORE starting the API, so the schema always
    # matches the code. The app itself never creates tables.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
